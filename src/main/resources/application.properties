spring.application.name=lab1-app
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lab1}
spring.datasource.username=${DB_USERNAME:lab1}
spring.datasource.password=${DB_PASSWORD:lab1}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.default-property-inclusion=non_null
app.timers.fixed-delay-ms=30000
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
