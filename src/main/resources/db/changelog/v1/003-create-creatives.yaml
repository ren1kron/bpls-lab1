databaseChangeLog:
  - changeSet:
      id: 003-create-creatives
      author: lab1-app
      changes:
        - createTable:
            tableName: creatives
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: campaign_id
                  type: bigint
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: creatives
            baseColumnNames: campaign_id
            referencedTableName: campaigns
            referencedColumnNames: id
            constraintName: fk_creatives_campaign
            onDelete: CASCADE
