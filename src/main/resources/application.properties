spring.application.name=lab1-app
server.port=26125
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:6262/lab1}
spring.datasource.username=${DB_USERNAME:lab1}
spring.datasource.password=${DB_PASSWORD:lab1}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.jackson.default-property-inclusion=non_null
app.timers.fixed-delay-ms=30000
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
